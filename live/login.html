<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sign in · Tradetron</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" />
<link rel="stylesheet" href="assets/tokens.css" />
<link rel="stylesheet" href="assets/system.css?v=5" />
<link rel="stylesheet" href="assets/pages.css" />
<style>
  /* ---- auth page shell (shared layout for all 6 auth pages) ---- */
  .auth-shell{display:flex;align-items:flex-start;justify-content:center;padding:64px 20px 80px;background:var(--paper)}
  .auth-card{width:100%;max-width:440px;background:var(--surface);border:var(--hairline);border-radius:var(--radius-lg);padding:40px 36px;box-shadow:var(--shadow-md)}
  .auth-card__head{margin-bottom:24px}
  .auth-card__eyebrow{font-family:var(--font-mono);font-size:.72rem;color:var(--slate);letter-spacing:.08em;text-transform:uppercase}
  .auth-card__h1{font-family:var(--font-display);font-weight:600;font-size:1.85rem;line-height:1.15;margin:10px 0 8px;color:var(--ink);letter-spacing:-.01em}
  .auth-card__sub{font-size:.95rem;line-height:1.55;color:var(--ink-soft);margin:0}
  .auth-card .h-form{display:flex;flex-direction:column;gap:14px;margin-top:6px}
  .auth-card__row{display:flex;align-items:center;justify-content:space-between;margin-top:-2px}
  .auth-card__row a{font-family:var(--font-body);font-size:.82rem;color:var(--signal);text-decoration:none}
  .auth-card__row a:hover{text-decoration:underline}
  .auth-card__cta{width:100%;justify-content:center;box-sizing:border-box;margin-top:6px}
  .auth-card__foot{margin:22px 0 0;padding-top:18px;border-top:var(--hairline);text-align:center;font-size:.88rem;color:var(--ink-soft)}
  .auth-card__foot a{color:var(--signal);text-decoration:none;font-weight:500}
  .auth-card__foot a:hover{text-decoration:underline}
  .auth-trust{margin-top:14px;font-family:var(--font-mono);font-size:.7rem;color:var(--slate);letter-spacing:.02em;text-align:center}
  .auth-trust-strip{display:flex;flex-wrap:wrap;justify-content:center;gap:8px 14px;margin-top:18px;font-family:var(--font-mono);font-size:.7rem;color:var(--slate);letter-spacing:.02em}
  .auth-trust-strip span{display:inline-flex;align-items:center;gap:6px}
  .auth-trust-strip span::before{content:"·";color:var(--rule-strong)}
  .auth-trust-strip span:first-child::before{content:none}
  .auth-divider{display:flex;align-items:center;gap:12px;margin:18px 0 6px;font-family:var(--font-mono);font-size:.7rem;color:var(--slate);letter-spacing:.08em;text-transform:uppercase}
  .auth-divider::before,.auth-divider::after{content:"";flex:1;height:1px;background:var(--rule-strong)}
  .auth-oauth{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px}
  .auth-oauth--full{grid-template-columns:1fr;margin-top:8px}
  .auth-oauth-btn{display:inline-flex;align-items:center;justify-content:center;gap:10px;height:42px;padding:0 14px;border:var(--hairline);border-radius:var(--radius-sm);background:var(--paper);color:var(--ink);text-decoration:none;font-family:var(--font-body);font-size:.88rem;font-weight:500;transition:border-color .15s,background .15s}
  .auth-oauth-btn:hover{border-color:var(--signal);background:var(--paper-2)}
  .auth-oauth-btn .glyph{display:inline-grid;place-items:center;width:20px;height:20px;border-radius:3px;background:var(--ink);color:var(--paper);font-family:var(--font-display);font-weight:600;font-size:.78rem}
  .auth-check{display:flex;align-items:flex-start;gap:10px;font-size:.86rem;line-height:1.5;color:var(--ink-soft);cursor:pointer;user-select:none}
  .auth-check input{margin-top:3px;accent-color:var(--signal)}
  .auth-check a{color:var(--signal);text-decoration:none}
  .auth-check a:hover{text-decoration:underline}
  .auth-hint{font-family:var(--font-mono);font-size:.7rem;color:var(--slate);margin-top:6px;letter-spacing:.02em}
  /* OTP boxes */
  .auth-otp{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
  .auth-otp input{height:52px;text-align:center;font-family:var(--font-mono);font-size:1.25rem;border:var(--hairline);border-radius:var(--radius-sm);background:var(--field);color:var(--ink)}
  .auth-otp input:focus{outline:0;border-color:var(--signal);background:var(--paper)}
  /* phone row */
  .auth-phone{display:grid;grid-template-columns:96px 1fr;gap:8px}
  /* split name row */
  .auth-split{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  /* status block on signup/verify pages */
  .auth-status{background:var(--paper-2);border:var(--hairline);border-radius:var(--radius-md);padding:18px 20px;margin-bottom:6px}
  .auth-status__label{font-family:var(--font-mono);font-size:.7rem;color:var(--slate);letter-spacing:.08em;text-transform:uppercase}
  .auth-status__val{font-family:var(--font-display);font-weight:500;font-size:1rem;color:var(--ink);margin-top:4px;word-break:break-all}
  @media(max-width:520px){
    .auth-card{padding:30px 22px}
    .auth-oauth{grid-template-columns:1fr}
    .auth-split{grid-template-columns:1fr}
    .auth-otp input{height:46px;font-size:1.1rem}
  }
</style>
</head>
<body data-screen-label="Sign in">

<div data-include="_header.html"></div>


<main class="auth-shell">
  <div class="auth-card">
    <div class="auth-card__head">
      <span class="auth-card__eyebrow">Welcome back</span>
      <h1 class="auth-card__h1">Sign in to <span class="sig">Tradetron.</span></h1>
      <p class="auth-card__sub">Your strategies are right where you left them.</p>
    </div>

    <div class="auth-oauth">
      <a href="/login/google" class="auth-oauth-btn"><span class="glyph">G</span> Google</a>
      <a href="/login/facebook" class="auth-oauth-btn"><span class="glyph">f</span> Facebook</a>
    </div>
    <div class="auth-oauth auth-oauth--full">
      <a href="/login/zerodha" class="auth-oauth-btn"><span class="glyph">Z</span> Continue with Zerodha (Kite)</a>
    </div>

    <div class="auth-divider">or with email</div>

    <form class="h-form" method="POST" action="/login" name="loginForm">
      <input type="hidden" name="_token" value="{{csrf_token}}" />
      <div class="h-field">
        <label class="h-label" for="login-email">Email or phone</label>
        <input class="h-input" id="login-email" name="email" type="text" placeholder="you@example.com or +91 9XXXXXXXXX" autocomplete="username" required />
      </div>
      <div class="h-field">
        <label class="h-label" for="login-pass" style="display:flex;justify-content:space-between;align-items:center">
          <span>Password</span>
          <a href="forgot-password.html" style="color:var(--signal);text-transform:none;letter-spacing:0;font-family:var(--font-body);font-size:.78rem;text-decoration:none">Forgot? →</a>
        </label>
        <input class="h-input" id="login-pass" name="password" type="password" placeholder="Your password" autocomplete="current-password" required />
      </div>
      <label class="auth-check"><input type="checkbox" name="remember" value="1" /> <span>Keep me signed in on this device.</span></label>
      <button class="h-btn h-btn--primary auth-card__cta" type="submit">Sign in →</button>
      <p class="auth-trust">Your password is encrypted in transit. We never share it.</p>
    </form>

    <p class="auth-card__foot">No account yet? <a href="register.html">Open one — it's free →</a></p>
  </div>
</main>


<div data-include="_footer.html"></div>

<script src="assets/theme.js"></script>
<script src="assets/include.js?v=2" defer></script>
</body>
</html>
